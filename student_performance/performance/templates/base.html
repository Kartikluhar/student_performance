<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Student Performance AI{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .navbar {
            background: #111827;
        }

        .card {
            background: #1e293b;
            border: none;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,255,255,0.08);
        }

        .btn-primary {
            background: linear-gradient(45deg, #00f5ff, #6366f1);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .sidebar-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
        }

        .result-box {
            padding: 20px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
        }

        .fail-box {
            background: linear-gradient(45deg, #dc2626, #ef4444);
            padding: 20px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            background: #111827;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand fw-bold text-info" href="#">
        🎓 AI Student Performance
    </a>
    <div class="ms-auto">
        <a href="{% url "dashboard" %}" class="btn btn-outline-light">Dashboard</a>
        <a href="{% url "upload_csv" %}" class="btn btn-outline-info me-2">Upload CSV</a>
        <a href="{% url "predict_performance" %}" class="btn btn-outline-light">Predict</a>
    </div>
</nav>

<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 Student Performance Prediction | Built with Django + ML
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
