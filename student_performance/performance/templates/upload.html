<!-- templates/upload.html -->
{% extends 'base.html' %}

{% block title %}Upload Dataset{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h3 class="mb-4 text-info">📂 Upload Student Dataset</h3>

            <form action="#" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="file" class="form-control bg-dark text-light" name="csv_file" accept=".csv">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Upload
                </button>
            </form>

            <hr class="my-4">

            <p class="text-secondary small">
                Upload CSV containing student features like:
                attendance, marks, study_hours, etc.
            </p>
        </div>
    </div>
</div>

{% endblock %}
